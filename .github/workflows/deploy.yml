name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 서버에 SSH 접속 후 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 165.245.183.9
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/dobae-seriously
            git pull origin main
            npm install
            npm run build
            pm2 restart dobae
            echo "✅ 배포 완료: $(date)"
